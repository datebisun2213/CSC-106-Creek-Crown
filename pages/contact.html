<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiries | Creek & Crown</title>
    <link rel="stylesheet" href="../main.css">
</head>
<body id="contact-page">

    <div class="marquee-bar"><div class="marquee-content">UPCOMING: DELTA FASHION WEEK 2026 • NEW OKA & ETIBO HYBRIDS DROPPING SOON • BOOK YOUR VIP FITTING NOW</div></div>

    <header>
        <a href="../index.html" class="brand-logo">CREEK<span>&</span>CROWN</a>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <nav id="nav-menu">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="products.html">Showcase</a></li>
                <li><a href="trustees.html">Trustees</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="contact.html" class="active">Inquiries</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 style="text-align: center; margin-bottom: 10px;">Book a Fitting</h1>
        <p style="text-align: center; margin-bottom: 40px; color: #666;">Schedule a private consultation with our master tailors.</p>

        <form class="booking-form" id="appointment-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="E.g. Tariq Briggs">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="client@example.com">
            </div>

            <div class="form-group">
                <label for="service">Service Required</label>
                <select id="service">
                    <option value="etibo">Custom Etibo Tailoring</option>
                    <option value="woko">Woko Two-Piece</option>
                    <option value="accessories">Coral Bead Customization</option>
                    <option value="general">General Inquiry</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date">
            </div>

            <button type="submit" class="btn-main" style="width: 100%;">Submit Request</button>
        </form>

        <div id="form-response" class="form-response"></div>
    </main>

    <footer><p>&copy; 2026 Creek & Crown Fashion House.</p></footer>
    <script src="../script.js"></script>
</body>
</html>
